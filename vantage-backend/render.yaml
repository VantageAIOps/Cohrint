services:
  - type: web
    name: vantage-ingest
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        value: https://oyljzpvwdfktrkeotmon.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EVAL_ENABLED
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
