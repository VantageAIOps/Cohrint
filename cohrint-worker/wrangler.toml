name            = "cohrint-api"
main            = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── Custom domain — api.cohrint.com → this Worker ────────────────────────────
# Uses [[custom_domains]] instead of routes[] — no Zone:Workers Routes permission needed
[[routes]]
pattern = "api.cohrint.com"
custom_domain = true

# ── D1 Database (events, orgs, config) ───────────────────────────────────────
# After running `npm run db:create`, replace the placeholder IDs below.
[[d1_databases]]
binding         = "DB"
database_name   = "cohrint-events"
database_id     = "a1301c2a-19bf-4fa3-8321-bba5e497de10"
migrations_dir  = "migrations"

# ── KV Namespace (rate limiting, Slack configs, org cache) ───────────────────
# After running `npm run kv:create`, replace the placeholder ID below.
[[kv_namespaces]]
binding = "KV"
id      = "65b5609ad5b747c9b416632a19529f24"
preview_id = "65b5609ad5b747c9b416632a19529f24"

# ── Workers AI (BGE embeddings for semantic cache) ────────────────────────────
[ai]
binding = "AI"

# ── Vectorize (semantic cache vector store) ───────────────────────────────────
# Run once to create: wrangler vectorize create cohrint-semantic-cache --dimensions=384 --metric=cosine
[[vectorize]]
binding     = "VECTORIZE"
index_name  = "cohrint-semantic-cache"

# ── R2 Bucket (semantic cache response bodies + audit log backup) ─────────────
# Create once: wrangler r2 bucket create cohrint-cache
# T013: cache response bodies moved to R2 (Release A — D1 still primary)
# T014: audit events dual-written to R2 for tamper-evident append-only log
[[r2_buckets]]
binding     = "CACHE_BUCKET"
bucket_name = "cohrint-cache"

# ── Workers Analytics Engine (per-endpoint metrics counters) ─────────────────
# Free tier: 10M writes/month. High-volume writes (events ingest) are sampled
# at 10% to stay within free-tier at up to 3M events/day (90M writes/mo × 10%).
[[analytics_engine_datasets]]
binding  = "METRICS"
dataset  = "cohrint_metrics"

# ── Environment variables (non-secret) ───────────────────────────────────────
[vars]
ENVIRONMENT        = "production"
ALLOWED_ORIGINS    = "https://cohrint.com,https://www.cohrint.com,https://cohrint.pages.dev"
RATE_LIMIT_RPM     = "1000"

# ── Cron Triggers — anomaly detection every 10 minutes ──────────────────
[triggers]
crons = ["*/10 * * * *"]

# ── Secrets (set via: wrangler secret put SECRET_NAME) ───────────────────────
# RESEND_API_KEY             — Resend API key for email (member invites, key recovery)
#                              Get a free key at resend.com — 3,000 emails/month
# TOKEN_ENCRYPTION_SECRET    — AES-256-GCM key material for Copilot PAT encryption
#                              Generate: openssl rand -base64 32

# ── Cloudflare Queues (T010 — async event ingest) ────────────────────────────
[[queues.producers]]
queue   = "cohrint-ingest"
binding = "INGEST_QUEUE"

[[queues.producers]]
queue   = "cohrint-ingest-dlq"
binding = "INGEST_DLQ"

[[queues.consumers]]
queue              = "cohrint-ingest"
max_batch_size     = 100
max_batch_timeout  = 5
max_retries        = 3
dead_letter_queue  = "cohrint-ingest-dlq"

# ── Preview environment ───────────────────────────────────────────────────────
[env.preview]
name = "cohrint-api-preview"
[env.preview.vars]
ENVIRONMENT     = "preview"
ALLOWED_ORIGINS = "http://localhost:*,https://*.cohrint.com,https://cohrint.pages.dev"
