name: Setup Branch Protection Rules

# One-time (or re-runnable) workflow to configure branch protection.
# Run manually from GitHub Actions > Setup Branch Protection Rules > Run workflow.
#
# What it sets up:
#   main:
#     - Require PR before merge (no direct pushes)
#     - Require 1 approving review
#     - Dismiss stale reviews when new commits pushed
#     - Require status checks: TypeScript, API tests, Env tests
#     - Allow admins to bypass (so Actions can still push tags etc)
#
#   v* (version branches):
#     - Require PR from feature branches (v*/P*)
#     - Allow direct pushes by admin (for hotfixes)
#     - No required reviews (version branch is working branch)
#
# Required: The GITHUB_TOKEN must have admin:write permission.
# If that fails, run the gh commands below locally with a PAT.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print rules without applying'
        required: false
        type: boolean
        default: false

jobs:
  protect-main:
    name: Protect main branch
    runs-on: ubuntu-latest
    # administration: write is NOT available to GITHUB_TOKEN on personal repos.
    # This workflow uses ADMIN_PAT (a classic PAT with repo + admin:repo_hook scope).
    # Add it: repo Settings → Secrets → Actions → ADMIN_PAT

    steps:
      - name: Show planned rules
        run: |
          echo "## Branch protection rules to apply" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### main" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Require PR (no direct push)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Require 1 approving review" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dismiss stale reviews on new push" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Required checks: TypeScript, API Tests, Env Tests, PR Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Allow admin bypass" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### v* (version branches)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No force-push" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No deletions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### backup/* (backup branches)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No force-push (immutable)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No deletions (immutable)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No direct pushes after creation" >> $GITHUB_STEP_SUMMARY

      - name: Apply protection to main
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          gh api repos/${{ github.repository }}/branches/main/protection \
            --method PUT \
            --input - << 'EOF'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "TypeScript Check",
                "API Test Suites",
                "Environment & Health Tests",
                "PR Gate Summary"
              ]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "required_approving_review_count": 1,
              "dismiss_stale_reviews": true,
              "require_last_push_approval": false,
              "bypass_pull_request_allowances": {
                "users": [],
                "teams": [],
                "apps": []
              }
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_conversation_resolution": true,
            "lock_branch": false,
            "allow_fork_syncing": false
          }
          EOF
          echo "✅ main branch protection applied"

      - name: Apply protection to backup branches
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          # Protect backup/* branches — fully immutable (no push, no delete, no force-push)
          # Uses the newer branch protection rulesets API (available for all repos)
          gh api repos/${{ github.repository }}/rulesets \
            --method POST \
            --input - << 'EOF'
          {
            "name": "Backup branches are immutable",
            "target": "branch",
            "enforcement": "active",
            "conditions": {
              "ref_name": {
                "include": ["refs/heads/backup/**"],
                "exclude": []
              }
            },
            "rules": [
              { "type": "deletion" },
              { "type": "non_fast_forward" },
              { "type": "update", "parameters": { "update_allows_fetch_and_merge": false } },
              { "type": "creation" }
            ],
            "bypass_actors": [
              {
                "actor_id": 0,
                "actor_type": "OrganizationAdmin",
                "bypass_mode": "always"
              }
            ]
          }
          EOF
          echo "✅ backup/* branch ruleset applied (immutable)"

      - name: Apply protection to version branches
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.ADMIN_PAT }}
        run: |
          # Version branches: no force-push, no deletion
          gh api repos/${{ github.repository }}/rulesets \
            --method POST \
            --input - << 'EOF'
          {
            "name": "Version branches — no force-push or deletion",
            "target": "branch",
            "enforcement": "active",
            "conditions": {
              "ref_name": {
                "include": ["refs/heads/v[0-9]*"],
                "exclude": ["refs/heads/v*/**"]
              }
            },
            "rules": [
              { "type": "deletion" },
              { "type": "non_fast_forward" }
            ]
          }
          EOF
          echo "✅ v* branch ruleset applied"

      - name: Final summary
        if: always()
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "ℹ️  Dry run — no rules were applied" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Branch protection rules applied**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To verify: GitHub repo → Settings → Branches" >> $GITHUB_STEP_SUMMARY
          fi

  print-manual-setup:
    name: Print manual setup instructions
    runs-on: ubuntu-latest
    steps:
      - name: Manual setup guide
        run: |
          cat << 'GUIDE'
          ═══════════════════════════════════════════════════════════════
          MANUAL GITHUB UI STEPS (in case API rules fail):
          ═══════════════════════════════════════════════════════════════

          1. Go to: https://github.com/Amanjain98/VantageAI/settings/branches

          2. Add rule for "main":
             ☑ Require a pull request before merging
               ☑ Require approvals: 1
               ☑ Dismiss stale pull request approvals when new commits are pushed
             ☑ Require status checks to pass before merging
               ☑ Require branches to be up to date before merging
               Add checks: "TypeScript Check", "API Test Suites", "Environment & Health Tests", "PR Gate Summary"
             ☑ Require conversation resolution before merging
             ☐ Do NOT check "Include administrators" (so Actions can still push)
             ☑ Allow force pushes → ☐ (disable)
             ☑ Allow deletions → ☐ (disable)

          3. The "Approve" button:
             When you open a PR from v1.0 → main, GitHub shows a
             "Review changes" button. Click it → select "Approve" → Submit.
             This is the manual approval gate.

          4. Enable "Allow pull request authors to approve their own PR":
             Settings → General → Pull Requests → ☑ Allow authors to approve

          ═══════════════════════════════════════════════════════════════
          GUIDE
          echo ""
          echo "Summary written to GitHub step log above."
