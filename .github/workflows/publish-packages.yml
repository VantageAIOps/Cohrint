name: Publish Packages

# Auto-publish npm + PyPI packages when version bumps land on main
# Only publishes packages whose version differs from the registry

on:
  push:
    branches: [main]
    paths:
      - 'cohrint-mcp/**'
      - 'cohrint-js-sdk/**'
      - 'cohrint-local-proxy/**'
      - 'cohrint-agent/**'
  workflow_dispatch: # Manual trigger for force-publish

# Only one publish at a time. Rapid merges to main would otherwise queue
# multiple publish runs that each fetch the registry; detect-changes + 4
# publish jobs × duplicate runs is the single most expensive way to burn minutes.
concurrency:
  group: publish-packages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect version changes
    runs-on: ubuntu-latest
    outputs:
      mcp: ${{ steps.check.outputs.mcp }}
      sdk: ${{ steps.check.outputs.sdk }}
      proxy: ${{ steps.check.outputs.proxy }}
      agent: ${{ steps.check.outputs.agent }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Check versions against registry
        id: check
        run: |
          check_version() {
            local dir=$1 npm_name=$2 output_key=$3
            local local_ver=$(node -e "console.log(require('./${dir}/package.json').version)")
            local registry_ver=$(npm view "$npm_name" version 2>/dev/null || echo "0.0.0")
            echo "  ${npm_name}: local=${local_ver} registry=${registry_ver}"
            if [ "$local_ver" != "$registry_ver" ]; then
              echo "${output_key}=true" >> $GITHUB_OUTPUT
              echo "  → WILL PUBLISH"
            else
              echo "${output_key}=false" >> $GITHUB_OUTPUT
              echo "  → up to date"
            fi
          }

          echo "Checking package versions..."
          check_version "cohrint-mcp" "cohrint-mcp" "mcp"
          check_version "cohrint-js-sdk" "cohrint" "sdk"
          check_version "cohrint-local-proxy" "cohrint-local-proxy" "proxy"

          # Check Python package version against PyPI JSON API
          local_py_ver=$(python3 -c "import tomllib; d=tomllib.load(open('cohrint-agent/pyproject.toml','rb')); print(d['project']['version'])" 2>/dev/null || echo "0.0.0")
          registry_py_ver=$(curl -s https://pypi.org/pypi/cohrint-agent/json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['info']['version'])" 2>/dev/null || echo "0.0.0")
          echo "  cohrint-agent: local=${local_py_ver} registry=${registry_py_ver}"
          if [ "$local_py_ver" != "$registry_py_ver" ]; then
            echo "agent=true" >> $GITHUB_OUTPUT
            echo "  → WILL PUBLISH"
          else
            echo "agent=false" >> $GITHUB_OUTPUT
            echo "  → up to date"
          fi

  publish-mcp:
    name: Publish cohrint-mcp
    needs: detect-changes
    if: needs.detect-changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install, build, publish
        working-directory: cohrint-mcp
        run: |
          npm ci
          npm run build
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-sdk:
    name: Publish cohrint
    needs: detect-changes
    if: needs.detect-changes.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install, build, publish
        working-directory: cohrint-js-sdk
        run: |
          npm ci
          npm run build
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-proxy:
    name: Publish cohrint-local-proxy
    needs: detect-changes
    if: needs.detect-changes.outputs.proxy == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install, build, publish
        working-directory: cohrint-local-proxy
        run: |
          npm ci
          npm run build
          npm publish --access public --provenance
          NEW_VER=$(node -e "console.log(require('./package.json').version)")
          npm deprecate "cohrint-local-proxy@<${NEW_VER}" "Upgrade to ${NEW_VER}: run npm install -g cohrint-local-proxy"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # NEW_VER is derived from package.json — not user input, no injection risk

  publish-agent:
    name: Publish cohrint-agent (PyPI)
    needs: detect-changes
    if: needs.detect-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build
        working-directory: cohrint-agent
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cohrint-agent/dist/

  summary:
    name: Publish Summary
    needs: [detect-changes, publish-mcp, publish-sdk, publish-proxy, publish-agent]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Package Publish Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Changed | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| cohrint-mcp | ${{ needs.detect-changes.outputs.mcp }} | ${{ needs.publish-mcp.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cohrint | ${{ needs.detect-changes.outputs.sdk }} | ${{ needs.publish-sdk.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cohrint-local-proxy | ${{ needs.detect-changes.outputs.proxy }} | ${{ needs.publish-proxy.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cohrint-agent (PyPI) | ${{ needs.detect-changes.outputs.agent }} | ${{ needs.publish-agent.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
