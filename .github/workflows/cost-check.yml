name: AI Cost Gate

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Runs on every PR that touches code which calls LLM APIs.
# Pulls the last N events from Vantage for the PR branch, checks
# against per-PR and daily budget limits, and blocks merge if exceeded.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'
      - '**.ts'
      - '**.js'
      - '**.mjs'
# Cancel superseded runs on the same PR to avoid billing duplicate invocations
# when the user pushes a rapid sequence of commits.
concurrency:
  group: cost-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cost-gate:
    name: Check AI spend for this PR
    runs-on: ubuntu-latest
    permissions:
      contents: read        # needed to checkout the repo
      pull-requests: write  # needed to post the cost comment
    env:
      VANTAGE_API_KEY: ${{ secrets.VANTAGE_API_KEY }}
      VANTAGE_API_BASE: ${{ secrets.VANTAGE_API_BASE || 'https://api.cohrint.com' }}
      # Budget limits (USD) — adjust per project
      PR_BUDGET_USD: ${{ vars.PR_BUDGET_USD || '5.00' }}
      DAILY_BUDGET_USD: ${{ vars.DAILY_BUDGET_USD || '50.00' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Vantage SDK
        run: pip install requests

      - name: Fetch PR cost + cross-platform spend from Vantage
        id: cost
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref }}
        run: |
          python3 - <<'EOF'
          import os, json, sys, urllib.request, urllib.error

          api_base = os.environ['VANTAGE_API_BASE'].rstrip('/')
          api_key  = os.environ.get('VANTAGE_API_KEY', '')
          pr_num   = os.environ.get('PR_NUMBER', 'unknown')
          branch   = os.environ.get('BRANCH', 'unknown')
          pr_limit = float(os.environ.get('PR_BUDGET_USD', '5.00'))

          if not api_key:
              print("::warning ::VANTAGE_API_KEY not set — skipping cost gate")
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("pr_cost=0.00\n")
                  f.write("daily_cost=0.00\n")
                  f.write("cross_platform_cost=0.00\n")
                  f.write("budget_pct=0\n")
                  f.write("status=skipped\n")
              sys.exit(0)

          # Fetch org-wide cost summary
          pr_cost = daily_cost = 0.0
          url = f"{api_base}/v1/analytics/summary"
          req = urllib.request.Request(url, headers={"Authorization": f"Bearer {api_key}"})
          try:
              with urllib.request.urlopen(req, timeout=10) as resp:
                  data = json.loads(resp.read())
                  pr_cost    = float(data.get('mtd_cost_usd', 0))
                  daily_cost = float(data.get('today_cost_usd', 0))
          except Exception as e:
              print(f"::warning ::Could not fetch cost data: {e}")

          # Fetch cross-platform org spend
          cross_cost = 0.0
          budget_pct = 0
          try:
              xp_url = f"{api_base}/v1/cross-platform/summary?days=1"
              xp_req = urllib.request.Request(xp_url, headers={"Authorization": f"Bearer {api_key}"})
              with urllib.request.urlopen(xp_req, timeout=10) as resp:
                  xp_data = json.loads(resp.read())
                  cross_cost = float(xp_data.get('total_cost_usd', 0))
                  budget = xp_data.get('budget', {})
                  budget_pct = int(budget.get('budget_pct', 0))
          except Exception:
              pass  # Cross-platform data may be empty for new accounts

          exceeded = pr_cost > pr_limit
          status = "exceeded" if exceeded else "ok"

          print(f"PR #{pr_num} cost: ${pr_cost:.4f} (limit: ${pr_limit:.2f}) → {status}")
          if cross_cost > 0:
              print(f"Cross-platform org spend today: ${cross_cost:.2f} ({budget_pct}% of budget)")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"pr_cost={pr_cost:.4f}\n")
              f.write(f"daily_cost={daily_cost:.4f}\n")
              f.write(f"cross_platform_cost={cross_cost:.2f}\n")
              f.write(f"budget_pct={budget_pct}\n")
              f.write(f"status={status}\n")
          EOF

      - name: Comment cost report on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status    = '${{ steps.cost.outputs.status }}';
            const prCost    = '${{ steps.cost.outputs.pr_cost }}';
            const dailyCost = '${{ steps.cost.outputs.daily_cost }}';
            const crossCost = '${{ steps.cost.outputs.cross_platform_cost }}';
            const budgetPct = '${{ steps.cost.outputs.budget_pct }}';
            const prLimit   = process.env.PR_BUDGET_USD || '5.00';
            const icon      = status === 'ok' ? '✅' : status === 'skipped' ? 'ℹ️' : '🚨';

            const rows = [
              `| PR spend (branch) | **$${prCost}** |`,
              `| Today's API spend | $${dailyCost} |`,
              `| PR budget limit | $${prLimit} |`,
              `| Status | **${status.toUpperCase()}** |`,
            ];

            // Add cross-platform data if available
            if (parseFloat(crossCost) > 0) {
              rows.push(`| --- | --- |`);
              rows.push(`| **All AI spend today** (Copilot+Cursor+API) | **$${crossCost}** |`);
              rows.push(`| Org budget used | ${budgetPct}% |`);
            }

            const budgetWarning = parseInt(budgetPct) >= 80
              ? `\n> ⚠️ **Org AI budget is ${budgetPct}% used.** Consider optimizing before merging more AI-heavy changes.`
              : '';

            const body = [
              `## ${icon} Cohrint Cost Report`,
              '',
              `| Metric | Value |`,
              `|---|---|`,
              ...rows,
              '',
              status === 'exceeded'
                ? `> ⚠️ **This PR has exceeded its AI cost budget.** Review LLM usage before merging.\n> Set \`PR_BUDGET_USD\` repository variable to adjust the limit.`
                : status === 'skipped'
                ? `> ℹ️ Set \`VANTAGE_API_KEY\` repository secret to enable live cost tracking.`
                : `> Cost within budget. Safe to merge.`,
              budgetWarning,
              '',
              `*Powered by [Cohrint](https://cohrint.com) · [View dashboard](https://cohrint.com/app.html)*`,
            ].join('\n');

            // Update existing comment or create new one (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.body?.includes('Cohrint Cost Report') && c.user?.login === 'github-actions[bot]'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if budget exceeded
        if: steps.cost.outputs.status == 'exceeded'
        run: |
          echo "::error ::PR AI cost ${{ steps.cost.outputs.pr_cost }} exceeds budget ${{ env.PR_BUDGET_USD }}"
          exit 1
