name: VantageAI Test Suite

# Runs the full test suite as post-deploy validation on main.
#
# Triggers:
#   - Every PR to main                           → merge barricade (full suite)
#   - After CF Worker or Pages deploy on main    → post-deploy validation
#   - After ci-version pipeline runs on v* branch → redundant safety net
#   - Nightly at 02:00 UTC on main               → regression monitoring
#   - Manual dispatch                             → on-demand
#
# NOTE: ci-pr-gate.yml runs fast checks (type check, CLI build, unit tests).
#       This workflow runs the full API + browser suite as the final PR gate.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # PR merge barricade — full suite must pass before merging to main
  pull_request:
    branches: [main]

  # Post-deploy validation (main) + after version branch pipeline
  workflow_run:
    workflows:
      - "Deploy VantageAI API Worker"
      - "Deploy to Cloudflare Pages"
      - "Version Branch Pipeline"
    types:
      - completed

  # Weekly regression on main (Sunday 02:00 UTC) — saves ~6x CI minutes vs nightly
  schedule:
    - cron: "0 2 * * 0"

  # Manual: pick category, enable security/integrations/browser
  workflow_dispatch:
    inputs:
      category:
        description: "Category to run (blank = default: 01_api 02_ui 03–05 13_dashboard)"
        required: false
        default: ""
      with_security:
        description: "Include security + rate-limiting suites (09, 10)"
        required: false
        type: boolean
        default: false
      with_integrations:
        description: "Include integration suites (11_integrations, 12_mcp) — needs secrets"
        required: false
        type: boolean
        default: false
      with_browser:
        description: "Install Playwright and run browser/UI tests"
        required: false
        type: boolean
        default: true
      extended:
        description: "Include stress/load/latency suites (06, 07, 08)"
        required: false
        type: boolean
        default: false

jobs:
  # ── 1. Deployment health check ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test — API & Frontend Health
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Cloudflare propagation
        run: sleep 15

      - name: Check API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --retry 5 --retry-delay 5 --retry-all-errors \
            https://api.vantageaiops.com/v1/health)
          echo "API health: $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ API not responding (got $STATUS)"; exit 1; }
          echo "✅ API is live"

      - name: Check frontend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --retry 3 --retry-delay 5 \
            https://vantageaiops.com/)
          echo "Frontend: $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ Frontend not responding (got $STATUS)"; exit 1; }
          echo "✅ Frontend is live"

  # ── 2. API + unit test suites (no browser) ─────────────────────────────────
  api-tests:
    name: API Test Suites
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r tests/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: vantage-cli/package-lock.json

      - name: Install CLI dependencies
        working-directory: vantage-cli
        run: npm ci

      - name: Build CLI (required for dist/index.js + tsx harnesses)
        working-directory: vantage-cli
        run: npx tsup src/index.ts --format esm --dts --clean

      - name: Run API + core suites (no browser)
        env:
          HEADLESS: "1"
          VANTAGE_SITE_URL: "https://vantageaiops.com"
          VANTAGE_API_URL: "https://api.vantageaiops.com"
          VANTAGE_CI_SECRET: ${{ secrets.VANTAGE_CI_SECRET }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          EXTRA_FLAGS=""
          if [ "${{ inputs.category }}" != "" ]; then
            EXTRA_FLAGS="--category ${{ inputs.category }}"
          fi
          if [ "${{ inputs.with_security }}" = "true" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --security"
          fi
          if [ "${{ inputs.extended }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            EXTRA_FLAGS="$EXTRA_FLAGS --all"
          fi
          python tests/run_suite.py --no-browser --clean $EXTRA_FLAGS 2>&1 | tee /tmp/api-test-output.txt
          EXIT=${PIPESTATUS[0]}
          echo "Exit code: $EXIT"
          exit $EXIT

      - name: Generate failure summary
        if: always()
        run: |
          echo "## API Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Extract pass/fail totals
          if grep -q "passed.*failed" /tmp/api-test-output.txt 2>/dev/null; then
            grep -E "(passed|failed|skipped)" /tmp/api-test-output.txt | tail -5 | while read line; do
              echo "$line" >> $GITHUB_STEP_SUMMARY
            done
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          # List all failures with details
          FAILURES=$(grep -E "^  ✗|^       └─" /tmp/api-test-output.txt 2>/dev/null || true)
          if [ -n "$FAILURES" ]; then
            echo "### Failures" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$FAILURES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-tests-${{ github.run_number }}
          path: |
            /tmp/api-test-output.txt
            tests/artifacts/
            tests/test-results/

  # ── 3. Browser/UI test suites (Playwright) ─────────────────────────────────
  browser-tests:
    name: UI / Browser Tests (Playwright)
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Install Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run browser/UI suites
        env:
          HEADLESS: "1"
          VANTAGE_SITE_URL: "https://vantageaiops.com"
          VANTAGE_API_URL: "https://api.vantageaiops.com"
          VANTAGE_CI_SECRET: ${{ secrets.VANTAGE_CI_SECRET }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          if [ -n "${{ inputs.category }}" ]; then
            python tests/run_suite.py --category ${{ inputs.category }} 2>&1 | tee /tmp/browser-test-output.txt
          elif [ "${{ inputs.extended }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            python tests/run_suite.py --all 2>&1 | tee /tmp/browser-test-output.txt
          else
            python tests/run_suite.py --category 02_ui --category 13_dashboard 2>&1 | tee /tmp/browser-test-output.txt
          fi
          EXIT=${PIPESTATUS[0]}
          exit $EXIT

      - name: Generate failure summary
        if: always()
        run: |
          echo "## Browser Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -q "passed.*failed" /tmp/browser-test-output.txt 2>/dev/null; then
            grep -E "(passed|failed|skipped)" /tmp/browser-test-output.txt | tail -5 | while read line; do
              echo "$line" >> $GITHUB_STEP_SUMMARY
            done
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          FAILURES=$(grep -E "^  ✗|^       └─" /tmp/browser-test-output.txt 2>/dev/null || true)
          if [ -n "$FAILURES" ]; then
            echo "### Failures" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$FAILURES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload browser test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-tests-${{ github.run_number }}
          path: |
            /tmp/browser-test-output.txt
            tests/artifacts/
            tests/test-results/

  # ── 4. Stress / load tests (nightly + manual only) ─────────────────────────
  stress-tests:
    name: Stress & Load Tests
    runs-on: ubuntu-latest
    needs: api-tests
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Run stress/load/latency suites
        env:
          HEADLESS: "1"
          VANTAGE_SITE_URL: "https://vantageaiops.com"
          VANTAGE_API_URL: "https://api.vantageaiops.com"
          VANTAGE_CI_SECRET: ${{ secrets.VANTAGE_CI_SECRET }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          python tests/run_suite.py \
            --category 06_stress \
            --category 07_load \
            --category 08_latency \
            --no-report 2>&1 | tee /tmp/stress-output.txt
          EXIT=${PIPESTATUS[0]}
          cat /tmp/stress-output.txt
          exit $EXIT

      - name: Upload stress test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-tests-${{ github.run_number }}
          path: /tmp/stress-output.txt

  # ── 5. Security + Rate-Limiting suites (nightly + manual only) ─────────────
  security-tests:
    name: Security & Rate-Limiting Tests
    runs-on: ubuntu-latest
    needs: api-tests
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Run security + rate-limiting suites
        env:
          HEADLESS: "1"
          VANTAGE_SITE_URL: "https://vantageaiops.com"
          VANTAGE_API_URL: "https://api.vantageaiops.com"
          VANTAGE_CI_SECRET: ${{ secrets.VANTAGE_CI_SECRET }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          python tests/run_suite.py --security --no-report 2>&1 | tee /tmp/security-output.txt
          EXIT=${PIPESTATUS[0]}
          cat /tmp/security-output.txt
          exit $EXIT

      - name: Upload security test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-tests-${{ github.run_number }}
          path: /tmp/security-output.txt

  # ── 6. Summary ─────────────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [smoke-test, api-tests, browser-tests, stress-tests, security-tests]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## VantageAI Test Suite — ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Test | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests (core, no-browser) | ${{ needs.api-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Browser / UI Tests | ${{ needs.browser-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stress / Load / Latency | ${{ needs.stress-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security / Rate-Limiting | ${{ needs.security-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`  " >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical jobs failed
        if: |
          needs.smoke-test.result == 'failure' ||
          needs.api-tests.result == 'failure'
        run: |
          echo "❌ Critical tests failed — deployment may be broken"
          exit 1
