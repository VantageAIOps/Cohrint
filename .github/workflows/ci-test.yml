name: VantageAI Test Suite

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Run after worker is deployed
  workflow_run:
    workflows:
      - "Deploy VantageAI API Worker"
      - "Deploy to Cloudflare Pages"
    types:
      - completed
    branches:
      - main

  # Manual trigger with optional suite selection
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite number to run (leave blank for all fast suites)"
        required: false
        default: ""
      extended:
        description: "Run extended suites 11-21 as well"
        required: false
        type: boolean
        default: false
      with_browser:
        description: "Install Playwright and run browser tests"
        required: false
        type: boolean
        default: true

  # Nightly regression run at 02:00 UTC
  schedule:
    - cron: "0 2 * * *"

  # Also run on PRs from version branches to main
  pull_request:
    branches:
      - main
    paths:
      - "vantage-worker/**"
      - "vantage-final-v4/**"
      - "tests/**"

  # Also trigger when ci-version completes on a version branch
  workflow_run:
    workflows:
      - "Version Branch Pipeline"
    types:
      - completed

jobs:
  # ── 1. Deployment health check ──────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (deployment health)
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Cloudflare propagation
        # Give Cloudflare Workers time to propagate after deploy
        run: sleep 15

      - name: Check API is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --retry 5 --retry-delay 5 --retry-all-errors \
            https://api.vantageaiops.com/v1/health)
          echo "API health status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ API not responding (got $STATUS)"; exit 1; }
          echo "✅ API is live"

      - name: Check frontend is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --retry 3 --retry-delay 5 \
            https://vantageaiops.com/)
          echo "Frontend status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ Frontend not responding (got $STATUS)"; exit 1; }
          echo "✅ Frontend is live"

  # ── 2. API test suite (no browser needed) ──────────────────────────────────
  api-tests:
    name: API Tests (no browser)
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install requests structlog

      - name: Run API-only suites (fast, no Playwright)
        env:
          HEADLESS: "1"
        run: |
          cd $GITHUB_WORKSPACE
          python tests/run_suite.py --all --fast --no-report 2>&1 | tee /tmp/test-output.txt
          # Capture exit code (run_suite exits 1 if any suite fails)
          EXIT=${PIPESTATUS[0]}
          echo "Test runner exit code: $EXIT"
          exit $EXIT

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            /tmp/test-output.txt
            tests/test-results/

  # ── 3. Browser test suite (Playwright) ─────────────────────────────────────
  browser-tests:
    name: Browser Tests (Playwright)
    runs-on: ubuntu-latest
    needs: smoke-test
    timeout-minutes: 45
    # Skip browser tests on PRs (too slow for PR checks)
    if: |
      github.event_name != 'pull_request' && (
        github.event_name != 'workflow_dispatch' ||
        inputs.with_browser == true
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install requests structlog playwright

      - name: Install Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run full test suite (with browser)
        env:
          HEADLESS: "1"
        run: |
          cd $GITHUB_WORKSPACE
          if [ -n "${{ inputs.suite }}" ]; then
            python tests/run_suite.py --suite ${{ inputs.suite }} --no-report 2>&1 | tee /tmp/browser-test-output.txt
          elif [ "${{ inputs.extended }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            python tests/run_suite.py --all --fast --no-report 2>&1 | tee /tmp/browser-test-output.txt
          else
            python tests/run_suite.py --fast --no-report 2>&1 | tee /tmp/browser-test-output.txt
          fi
          EXIT=${PIPESTATUS[0]}
          exit $EXIT

      - name: Upload browser test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-test-results
          path: |
            /tmp/browser-test-output.txt
            tests/test-results/

  # ── 4. Summary ──────────────────────────────────────────────────────────────
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [smoke-test, api-tests, browser-tests]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## VantageAI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Test | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.api-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Browser Tests | ${{ needs.browser-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View full test artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical jobs failed
        if: |
          needs.smoke-test.result == 'failure' ||
          needs.api-tests.result == 'failure'
        run: |
          echo "❌ Critical tests failed — see artifacts for details"
          exit 1
