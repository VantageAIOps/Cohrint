name: Full Repository Backup

# Mirrors the entire Cohrint repo (all branches, tags, history)
# to the backup repo: Amanjain98/Vantage-AI
#
# Runs:
#   - After every push to main (production deploy)
#   - Daily at 03:00 UTC
#   - Manually via workflow_dispatch
#
# Required secret: BACKUP_REPO_TOKEN
#   A GitHub PAT (classic) with repo scope on Amanjain98/Vantage-AI
#   → Settings > Secrets > BACKUP_REPO_TOKEN

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKUP_REPO: https://github.com/Amanjain98/Vantage-AI.git

on:
  # Auto-triggers disabled — weekly cron + push-on-main was billing unnecessary
  # minutes. Run manually from the Actions tab after major milestones instead.
  workflow_dispatch:        # manual trigger anytime

jobs:
  mirror-backup:
    name: Mirror to Vantage-AI backup repo
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Clone source repo as bare mirror
        run: |
          git clone --mirror \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Amanjain98/VantageAI.git \
            repo-mirror
          echo "✅ Source cloned (mirror) — branches: $(cd repo-mirror && git branch | wc -l)"

      - name: Verify backup repo is reachable
        env:
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          if [ -z "$BACKUP_REPO_TOKEN" ]; then
            echo "⚠️  BACKUP_REPO_TOKEN secret not set — skipping mirror push"
            echo "    Add a PAT with repo scope to Settings > Secrets > BACKUP_REPO_TOKEN"
            exit 0
          fi

          # Detect token type: fine-grained PATs start with "github_pat_"
          # Classic PATs start with "ghp_"
          TOKEN_PREFIX="${BACKUP_REPO_TOKEN:0:4}"
          if [[ "$BACKUP_REPO_TOKEN" == github_pat_* ]]; then
            AUTH_HEADER="Bearer ${BACKUP_REPO_TOKEN}"
            echo "Token type: fine-grained PAT"
          else
            AUTH_HEADER="token ${BACKUP_REPO_TOKEN}"
            echo "Token type: classic PAT"
          fi

          # Check token validity first
          TOKEN_CHECK=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: ${AUTH_HEADER}" \
            https://api.github.com/user)
          echo "Token auth check: $TOKEN_CHECK"
          if [ "$TOKEN_CHECK" != "200" ]; then
            echo "❌ Token is invalid or expired (user endpoint returned $TOKEN_CHECK)"
            echo "   Token prefix: ${TOKEN_PREFIX}..."
            echo "   Fix: create a new PAT at https://github.com/settings/tokens"
            echo "   Required scope: 'repo' (full) for classic PAT"
            echo "   Or: 'Contents: Read and write' for fine-grained PAT with Vantage-AI repo access"
            exit 1
          fi

          # Check backup repo access
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: ${AUTH_HEADER}" \
            https://api.github.com/repos/Amanjain98/Vantage-AI)
          echo "Backup repo API status: $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "✅ Backup repo reachable"
          elif [ "$STATUS" = "404" ]; then
            echo "❌ Backup repo returned 404 — token can authenticate but cannot see Amanjain98/Vantage-AI"
            echo "   This means the token is missing 'repo' scope (classic) or"
            echo "   the fine-grained PAT doesn't include Amanjain98/Vantage-AI in its repository list."
            echo "   Fix:"
            echo "   - Classic PAT: ensure 'repo' scope is checked"
            echo "   - Fine-grained PAT: add Vantage-AI to 'Repository access' and grant 'Contents: Read and write'"
            exit 1
          else
            echo "❌ Unexpected status $STATUS"
            exit 1
          fi

      - name: Push mirror to backup repo
        env:
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          if [ -z "$BACKUP_REPO_TOKEN" ]; then exit 0; fi
          cd repo-mirror
          # x-access-token works for both classic and fine-grained PATs in git operations
          git remote set-url origin \
            https://x-access-token:${BACKUP_REPO_TOKEN}@github.com/Amanjain98/Vantage-AI.git
          echo "Pushing mirror..."
          git push --mirror --force 2>&1 | tail -20
          echo "✅ Mirror push complete"

      - name: Generate backup summary
        if: always()
        run: |
          echo "## Repository Backup — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d repo-mirror ]; then
            cd repo-mirror
            BRANCHES=$(git branch | wc -l | tr -d ' ')
            TAGS=$(git tag | wc -l | tr -d ' ')
            COMMITS=$(git log --all --oneline | wc -l | tr -d ' ')
            echo "| Item | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | $BRANCHES |" >> $GITHUB_STEP_SUMMARY
            echo "| Tags | $TAGS |" >> $GITHUB_STEP_SUMMARY
            echo "| Total commits | $COMMITS |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**Backup destination:** \`Amanjain98/Vantage-AI\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY

  # Secondary backup: upload a ZIP archive as a GitHub release artifact
  archive-backup:
    name: Create ZIP archive backup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only on schedule or manual dispatch (not every push — would be too many artifacts)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history

      - name: Create dated archive
        run: |
          DATE=$(date -u '+%Y%m%d-%H%M')
          git archive --format=zip --output="cohrint-backup-${DATE}.zip" HEAD
          echo "Archive size: $(du -sh cohrint-backup-${DATE}.zip | cut -f1)"
          echo "DATE=${DATE}" >> $GITHUB_ENV

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: cohrint-backup-${{ env.DATE }}
          path: cohrint-backup-*.zip
          retention-days: 30    # keep 30 days of ZIP backups
