name: Deploy to Cloudflare Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - production    # cohrint.com (stable, customer-facing)
      - main          # main.cohrint.com (staging, auth-gated)
    paths:
      - 'cohrint-frontend/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Verify required files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files exist
        run: |
          for f in index.html app.html auth.html signup.html docs.html \
                   calculator.html superadmin.html sw.js manifest.json \
                   _headers _redirects; do
            [ -f "cohrint-frontend/$f" ] || { echo "Missing: cohrint-frontend/$f"; exit 1; }
          done
          echo "All required files present"

  deploy-staging:
    name: Deploy Frontend to Staging
    runs-on: ubuntu-latest
    needs: preflight
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Deploy to Cloudflare Pages (staging branch)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          MAX_ATTEMPTS=4
          DELAY=30
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Deploy attempt $attempt / $MAX_ATTEMPTS (staging)"
            if npx wrangler pages deploy ./cohrint-frontend --project-name=cohrint --branch=main; then
              echo "Staging deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              sleep $DELAY
              DELAY=$((DELAY * 2))
            fi
          done
          exit 1
      - name: Confirm staging deployment
        run: echo "Frontend staging deployed"

  deploy-production:
    name: Deploy Frontend to Production
    runs-on: ubuntu-latest
    needs: preflight
    environment: cloudflare-production
    if: github.ref_name == 'production'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Deploy to Cloudflare Pages (production branch)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          MAX_ATTEMPTS=4
          DELAY=30
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Deploy attempt $attempt / $MAX_ATTEMPTS (production)"
            if npx wrangler pages deploy ./cohrint-frontend --project-name=cohrint --branch=production; then
              echo "Production deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              sleep $DELAY
              DELAY=$((DELAY * 2))
            fi
          done
          exit 1
      - name: Confirm production deployment
        run: echo "Frontend deployed to https://cohrint.com"
