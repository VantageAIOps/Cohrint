name: Deploy to Cloudflare Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main          # → production
      - preview       # → preview environment
    paths:
      - 'vantage-final-v4/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy VantageAI Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (for wrangler)
        run: npm ci

      - name: Verify required files exist
        run: |
          for f in index.html app.html auth.html signup.html docs.html \
                   calculator.html superadmin.html sw.js manifest.json \
                   _headers _redirects; do
            [ -f "vantage-final-v4/$f" ] || { echo "❌ Missing: vantage-final-v4/$f"; exit 1; }
          done
          echo "✅ All required files present"

      - name: Determine branch
        id: branch
        run: echo "branch=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare Pages (with retry)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          MAX_ATTEMPTS=4
          DELAY=30
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "▶ Deploy attempt $attempt / $MAX_ATTEMPTS"
            if npx wrangler pages deploy ./vantage-final-v4 \
                --project-name=vantageai \
                --branch=${{ steps.branch.outputs.branch }}; then
              echo "✅ Deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "⏳ Cloudflare API timeout — waiting ${DELAY}s before retry..."
              sleep $DELAY
              DELAY=$((DELAY * 2))   # exponential back-off: 30s → 60s → 120s
            fi
          done
          echo "❌ All $MAX_ATTEMPTS deploy attempts failed"
          exit 1

      - name: Confirm deployment
        if: github.ref == 'refs/heads/main'
        run: echo "✅ Frontend deployed — https://vantageaiops.com"
