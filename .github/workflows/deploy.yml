name: Deploy to Cloudflare Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - production    # → cohrint.com (stable, customer-facing)
      - main          # → main.cohrint.com (staging, auth-gated)
    paths:
      - 'cohrint-frontend/**'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # manual trigger from GitHub UI

# Only one Pages deploy per branch at a time. Rapid merges would otherwise queue
# multiple deploys that all run to completion, doubling billed minutes.
concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Cohrint Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (for wrangler)
        run: npm ci

      - name: Verify required files exist
        run: |
          for f in index.html app.html auth.html signup.html docs.html \
                   calculator.html superadmin.html sw.js manifest.json \
                   _headers _redirects; do
            [ -f "cohrint-frontend/$f" ] || { echo "❌ Missing: cohrint-frontend/$f"; exit 1; }
          done
          echo "✅ All required files present"

      - name: Determine branch
        id: branch
        run: echo "branch=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare Pages (with retry)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          MAX_ATTEMPTS=4
          DELAY=30
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "▶ Deploy attempt $attempt / $MAX_ATTEMPTS (branch: ${DEPLOY_BRANCH})"
            if npx wrangler pages deploy ./cohrint-frontend \
                --project-name=cohrint \
                --branch="$DEPLOY_BRANCH"; then
              echo "✅ Deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "⏳ Cloudflare API timeout — waiting ${DELAY}s before retry..."
              sleep $DELAY
              DELAY=$((DELAY * 2))   # exponential back-off: 30s → 60s → 120s
            fi
          done
          echo "❌ All $MAX_ATTEMPTS deploy attempts failed"
          exit 1

      - name: Confirm deployment
        env:
          DEPLOY_BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          if [ "$DEPLOY_BRANCH" = "production" ]; then
            echo "✅ Frontend deployed — https://cohrint.com"
          else
            echo "✅ Staging deployed — configure main.cohrint.com in Pages + set STAGING_CODE env var"
          fi
