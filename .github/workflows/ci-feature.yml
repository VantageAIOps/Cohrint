name: Feature Branch Check

# Runs on every push to a feature branch (v1.0/P001-fix, v1.0/P002-auth, etc.)
# Fast feedback only — no deploy. Keeps CI cheap and quick.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - 'v*/P*'       # v1.0/P001-fix-auth, v1.0/P023-dark-theme …
  pull_request:
    branches:
      - 'v[0-9]*'     # PRs from feature branch → version branch
    paths:
      - 'vantage-worker/**'
      - 'vantage-final-v4/**'
      - 'tests/**'

jobs:
  # ── 1. TypeScript type check ──────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vantage-worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: vantage-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

  # ── 2. Frontend asset check ───────────────────────────────────────────────
  frontend-check:
    name: Frontend Assets Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          MISSING=0
          for f in index.html app.html auth.html signup.html docs.html calculator.html sw.js manifest.json _headers _redirects; do
            if [ ! -f "vantage-final-v4/$f" ]; then
              echo "❌ Missing: vantage-final-v4/$f"
              MISSING=1
            fi
          done
          [ "$MISSING" = "0" ] && echo "✅ All required files present" || exit 1

  # ── 3. Fast API smoke tests (no browser, no deploy) ──────────────────────
  api-smoke:
    name: API Smoke Tests
    runs-on: ubuntu-latest
    needs: [typecheck, frontend-check]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests structlog

      - name: Run fast smoke tests against live API
        env:
          HEADLESS: '1'
        run: |
          # Run the core API suites only (01-06) for fast feedback
          python tests/run_suite.py --suite 01 --no-report 2>&1 | tee /tmp/smoke.txt || true
          python tests/run_suite.py --suite 02 --no-report 2>&1 | tee -a /tmp/smoke.txt || true
          python tests/run_suite.py --suite 05 --no-report 2>&1 | tee -a /tmp/smoke.txt || true
          echo "--- Smoke tests complete ---"
          cat /tmp/smoke.txt

      - name: Upload smoke test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-smoke-${{ github.run_number }}
          path: /tmp/smoke.txt

  # ── Summary ───────────────────────────────────────────────────────────────
  feature-check-summary:
    name: Feature Check Summary
    runs-on: ubuntu-latest
    needs: [typecheck, frontend-check, api-smoke]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## Feature Branch Check — ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend assets | ${{ needs.frontend-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API smoke tests | ${{ needs.api-smoke.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Merge to version branch when all checks are green." >> $GITHUB_STEP_SUMMARY

      - name: Fail if any check failed
        if: |
          needs.typecheck.result == 'failure' ||
          needs.frontend-check.result == 'failure'
        run: |
          echo "❌ Required checks failed — fix before merging to version branch"
          exit 1
