name: PR Gate

# Runs on every PR to main. Fast checks only to stay within GitHub Actions
# free tier (2,000 min/month). Heavy jobs (api-tests, cross-browser, mcp-tests)
# run via ci-test.yml on manual dispatch or post-deploy — not on every PR.
#
# Jobs:
#   1. TypeScript Check          — compile check on worker code (~3 min)
#   2. CLI Build                 — type check + bundle vantage-cli (~3 min)
#   3. Environment & Health Tests — verify API + frontend reachable (~2 min)
#   4. Connector Tests           — skipped unless connector files changed (~1 min)
#   5. Preview Deploy            — deploy preview, post URL as PR comment (~5 min)
#   6. PR Gate Summary           — fail if any critical job failed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  # ── 1. TypeScript type check ─────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: vantage-worker/package-lock.json

      - name: Install dependencies
        working-directory: vantage-worker
        run: npm ci

      - name: Run TypeScript check
        working-directory: vantage-worker
        run: npx tsc --noEmit

  # ── 1b. CLI Build & type check ──────────────────────────────────────────────
  cli-build:
    name: CLI Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: vantage-cli
        run: npm ci

      - name: Run TypeScript check
        working-directory: vantage-cli
        run: npx tsc --noEmit

      - name: Build CLI bundle
        working-directory: vantage-cli
        run: npx tsup src/index.ts --format esm --dts --clean

  # ── 2. Environment & Health Tests ────────────────────────────────────────────
  env-tests:
    name: Environment & Health Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check API health
        run: |
          # Retry with longer backoff to handle transient DNS issues on GH runners
          for attempt in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 --max-time 15 \
              --retry 3 --retry-delay 5 --retry-all-errors \
              https://api.vantageaiops.com/v1/health 2>/dev/null || echo "000")
            echo "Attempt $attempt: API health = $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ API is live"
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "❌ API not responding after 5 attempts"
          exit 1

      - name: Check frontend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --retry 3 --retry-delay 5 \
            https://vantageaiops.com/)
          echo "Frontend: $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ Frontend not responding (got $STATUS)"; exit 1; }
          echo "✅ Frontend is live"

      - name: Check auth endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://vantageaiops.com/auth)
          echo "Auth page: $STATUS"
          [ "$STATUS" = "200" ] || { echo "⚠️ Auth page returned $STATUS"; }

  # ── 3. Connector Tests (if connector code changed) ──────────────────────────
  connector-tests:
    name: Connector Tests
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: vantage-worker/package-lock.json

      - name: Check if connector code changed
        id: changes
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'vantage-worker/src/connectors/' 2>/dev/null || echo "")
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Connector files changed:"
            echo "$CHANGED"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No connector changes — skipping"
          fi

      - name: Install dependencies
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: vantage-worker
        run: npm ci

      - name: Run connector tests
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: vantage-worker
        run: |
          if [ -f "vitest.config.ts" ] || [ -f "vitest.config.js" ]; then
            npx vitest run --reporter=verbose src/connectors/ 2>&1 | tee /tmp/connector-tests.txt
          elif grep -q '"test"' package.json; then
            npm test -- --testPathPattern='connectors' 2>&1 | tee /tmp/connector-tests.txt
          else
            echo "✅ No connector test runner yet — passing" | tee /tmp/connector-tests.txt
          fi

      - name: Scan for leaked secrets in connector code
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          FOUND=$(grep -rn --include='*.ts' --include='*.js' \
            -E 'sk-ant-admin-|sk-proj-|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}' \
            vantage-worker/src/connectors/ 2>/dev/null | \
            grep -v 'test\|mock\|fake\|example\|placeholder' || true)
          if [ -n "$FOUND" ]; then
            echo "🚨 Potential secrets in connector code:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ No secrets detected in connector code"

      - name: Upload results
        if: always() && steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pr-connector-tests-${{ github.run_number }}
          path: /tmp/connector-tests.txt

  # ── 3b. CLI Unit Tests (suites 34 + 35 — fast, no live API needed) ──────────
  cli-unit-tests:
    name: CLI Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: vantage-cli/package-lock.json

      - name: Install CLI dependencies
        working-directory: vantage-cli
        run: npm ci

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pytest
        run: pip install pytest requests

      - name: Run CLI unit tests (suites 34 + 35)
        run: |
          python -m pytest tests/suites/34_cli_session/ tests/suites/35_recommendations/ -v --tb=short

  # ── 4. Preview Deploy ────────────────────────────────────────────────────────
  preview-deploy:
    name: Preview Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          BRANCH="${{ github.head_ref }}"
          # Deploy using the root wrangler.toml (has pages_build_output_dir)
          # --config flag ensures we don't pick up vantage-worker/wrangler.toml
          npx wrangler@latest pages deploy ./vantage-final-v4 \
            --project-name=vantageai \
            --branch="$BRANCH" \
            --config=wrangler.toml \
            --commit-dirty=true 2>&1 | tee /tmp/deploy-output.txt || true
          # Extract preview URL from output
          PREVIEW_URL=$(grep -oE 'https://[a-z0-9-]+\.vantageai\.pages\.dev' /tmp/deploy-output.txt | head -1 || true)
          if [ -z "$PREVIEW_URL" ]; then
            SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | head -c 28)
            PREVIEW_URL="https://${SLUG}.vantageai.pages.dev"
          fi
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $PREVIEW_URL"

      - name: Post preview URL as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const body = `### Preview Deployed\n\n` +
              `**URL:** ${url}\n\n` +
              `Verify the changes visually before merging.\n\n` +
              `---\n_Deployed by PR Gate workflow_`;

            // Check if we already commented (avoid spam on re-pushes)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.body?.includes('Preview Deployed') && c.user?.login === 'github-actions[bot]'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── 5. PR Gate Summary (required check — blocks merge on failure) ───────────
  pr-summary:
    name: PR Gate Summary
    runs-on: ubuntu-latest
    needs: [typecheck, cli-build, env-tests, connector-tests, cli-unit-tests, preview-deploy]
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "## PR Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Build | ${{ needs.cli-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment & Health | ${{ needs.env-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Connector Tests | ${{ needs.connector-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Unit Tests | ${{ needs.cli-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview Deploy | ${{ needs.preview-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> API, cross-browser, and MCP tests run via ci-test.yml (post-deploy / manual dispatch)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** #${{ github.event.number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.head_ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.event.pull_request.head.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical checks failed
        if: |
          needs.typecheck.result == 'failure' ||
          needs.cli-build.result == 'failure' ||
needs.connector-tests.result == 'failure' ||
          needs.cli-unit-tests.result == 'failure'
        run: |
          echo "❌ PR gate failed — fix the issues above before merging"
          exit 1
