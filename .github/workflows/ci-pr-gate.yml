name: PR Gate

# Runs on every PR to main. Fast checks only to stay within GitHub Actions
# free tier (2,000 min/month). Heavy jobs (api-tests, cross-browser, mcp-tests)
# run via ci-test.yml on manual dispatch or post-deploy — not on every PR.
#
# Jobs:
#   1. TypeScript Check          — compile check on worker code (~3 min)
#   2. CLI Build                 — install + verify cohrint-agent Python package (~2 min)
#   3. Environment & Health Tests — verify API + frontend reachable (~2 min)
#   4. Connector Tests           — skipped unless connector files changed (~1 min)
#   5. Secret Scan               — grep cohrint-worker/src/ for credential patterns (~1 min)
#   6. Preview Deploy            — deploy preview, post URL as PR comment (~5 min)
#   7. PR Gate Summary           — fail if any critical job failed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    # Skip for docs-only PRs — no backend/frontend code changed, no gate needed.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'ADMIN_GUIDE.md'
      - 'PRODUCT_STRATEGY.md'
      - 'GIT_MEMORY.md'
      - 'CLAUDE.md'

# Cancel any in-flight runs for this PR when a newer commit is pushed.
# Without this every force-push to a PR doubles (or triples) billable minutes.
concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  # ── 1. TypeScript type check ─────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: cohrint-worker/package-lock.json

      - name: Install dependencies
        working-directory: cohrint-worker
        run: npm ci

      - name: Run TypeScript check
        working-directory: cohrint-worker
        run: npx tsc --noEmit

  # ── 1b. Python Agent build check ────────────────────────────────────────────────
  cli-build:
    name: CLI Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cohrint-agent
        working-directory: cohrint-agent
        run: pip install -e ".[dev]"

      - name: Verify CLI entry point
        run: cohrint-agent --help

  # ── 2. Environment & Health Tests ────────────────────────────────────────────
  env-tests:
    name: Environment & Health Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check API health
        run: |
          # Retry with longer backoff to handle transient DNS issues on GH runners
          for attempt in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 --max-time 15 \
              --retry 3 --retry-delay 5 --retry-all-errors \
              https://api.cohrint.com/v1/health 2>/dev/null || echo "000")
            echo "Attempt $attempt: API health = $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ API is live"
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "❌ API not responding after 5 attempts"
          exit 1

      - name: Check frontend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --retry 3 --retry-delay 5 \
            https://cohrint.com/)
          echo "Frontend: $STATUS"
          [ "$STATUS" = "200" ] || { echo "❌ Frontend not responding (got $STATUS)"; exit 1; }
          echo "✅ Frontend is live"

      - name: Check auth endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://cohrint.com/auth)
          echo "Auth page: $STATUS"
          [ "$STATUS" = "200" ] || { echo "⚠️ Auth page returned $STATUS"; }

  # ── 3. Connector Tests (if connector code changed) ──────────────────────────
  connector-tests:
    name: Connector Tests
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: cohrint-worker/package-lock.json

      - name: Check if connector code changed
        id: changes
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'cohrint-worker/src/connectors/' 2>/dev/null || echo "")
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Connector files changed:"
            echo "$CHANGED"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No connector changes — skipping"
          fi

      - name: Install dependencies
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: cohrint-worker
        run: npm ci

      - name: Run connector tests
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: cohrint-worker
        run: |
          if [ -f "vitest.config.ts" ] || [ -f "vitest.config.js" ]; then
            npx vitest run --reporter=verbose src/connectors/ 2>&1 | tee /tmp/connector-tests.txt
          elif grep -q '"test"' package.json; then
            npm test -- --testPathPattern='connectors' 2>&1 | tee /tmp/connector-tests.txt
          else
            echo "✅ No connector test runner yet — passing" | tee /tmp/connector-tests.txt
          fi

      - name: Scan for leaked secrets in connector code
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          FOUND=$(grep -rn --include='*.ts' --include='*.js' \
            -E 'sk-ant-admin-|sk-proj-|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}' \
            cohrint-worker/src/connectors/ 2>/dev/null | \
            grep -v 'test\|mock\|fake\|example\|placeholder' || true)
          if [ -n "$FOUND" ]; then
            echo "🚨 Potential secrets in connector code:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ No secrets detected in connector code"

      - name: Upload results
        if: always() && steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pr-connector-tests-${{ github.run_number }}
          path: /tmp/connector-tests.txt

  # ── 3b. Python Agent Unit Tests ─────────────────────────────────────────────
  cli-unit-tests:
    name: CLI Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: cohrint-agent
        run: pip install -e ".[dev]"

      - name: Run Python agent unit tests
        working-directory: cohrint-agent
        run: python -m pytest tests/ -q --tb=short -x --ignore=tests/test_integration.py

  # ── 4. Preview Deploy (frontend PRs only) ───────────────────────────────────
  preview-deploy:
    name: Preview Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only deploy preview when cohrint-frontend/** files actually changed
    # Avoids burning 5-10 CI min on backend/test-only PRs
    if: |
      contains(github.event.pull_request.title, 'frontend') ||
      startsWith(github.head_ref, 'feat/frontend') ||
      startsWith(github.head_ref, 'fix/frontend') ||
      startsWith(github.head_ref, 'feat/ui') ||
      startsWith(github.head_ref, 'fix/ui')
    steps:
      - uses: actions/checkout@v4

      - name: Check for frontend file changes
        id: frontend-check
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'cohrint-frontend/' 2>/dev/null | wc -l)
          echo "frontend_changed=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Frontend files changed: $CHANGED"

      - uses: actions/setup-node@v4
        if: steps.frontend-check.outputs.frontend_changed != '0'
        with:
          node-version: '24'

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        if: steps.frontend-check.outputs.frontend_changed != '0'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BRANCH: ${{ github.head_ref }}
        run: |
          npx wrangler@latest pages deploy ./cohrint-frontend \
            --project-name=cohrint \
            --branch="$BRANCH" \
            --config=wrangler.toml \
            --commit-dirty=true 2>&1 | tee /tmp/deploy-output.txt || true
          PREVIEW_URL=$(grep -oE 'https://[a-z0-9-]+\.cohrint\.pages\.dev' /tmp/deploy-output.txt | head -1 || true)
          if [ -z "$PREVIEW_URL" ]; then
            SLUG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | head -c 28)
            PREVIEW_URL="https://${SLUG}.cohrint.pages.dev"
          fi
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $PREVIEW_URL"

      - name: Post preview URL as PR comment
        uses: actions/github-script@v7
        if: steps.frontend-check.outputs.frontend_changed != '0'
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const body = `### Preview Deployed\n\n` +
              `**URL:** ${url}\n\n` +
              `Verify the changes visually before merging.\n\n` +
              `---\n_Deployed by PR Gate workflow_`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.body?.includes('Preview Deployed') && c.user?.login === 'github-actions[bot]'
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── 5. Secret Scan (every PR — replaces deleted ci-connectors.yml scan) ──────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Scan worker source for leaked credentials
        run: |
          FOUND=$(grep -rn --include='*.ts' --include='*.js' \
            -E 'sk-ant-admin-|sk-ant-api[0-9]+-|sk-proj-|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|AKIA[0-9A-Z]{16}' \
            cohrint-worker/src/ 2>/dev/null | \
            grep -v -E 'test|mock|fake|example|placeholder' || true)
          if [ -n "$FOUND" ]; then
            echo "Potential secrets detected in worker source:"
            echo "$FOUND"
            exit 1
          fi
          echo "No secrets detected in cohrint-worker/src/"

  # ── 6. PR Gate Summary (required check — blocks merge on failure) ───────────
  pr-summary:
    name: PR Gate Summary
    runs-on: ubuntu-latest
    needs: [typecheck, cli-build, env-tests, connector-tests, cli-unit-tests, secret-scan, preview-deploy]
    if: always()
    steps:
      - name: Write summary
        env:
          PR_NUMBER: ${{ github.event.number }}
          BRANCH: ${{ github.head_ref }}
          COMMIT: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "## PR Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Check | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Build | ${{ needs.cli-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment & Health | ${{ needs.env-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Connector Tests | ${{ needs.connector-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Unit Tests | ${{ needs.cli-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview Deploy | ${{ needs.preview-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> API, cross-browser, and MCP tests run via ci-test.yml (post-deploy / manual dispatch)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** #${PR_NUMBER}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${BRANCH}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${COMMIT}\`" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical checks failed
        # preview-deploy is non-critical (skipped on non-frontend PRs)
        if: |
          needs.typecheck.result == 'failure' ||
          needs.cli-build.result == 'failure' ||
          needs.connector-tests.result == 'failure' ||
          needs.cli-unit-tests.result == 'failure' ||
          needs.secret-scan.result == 'failure'
        run: |
          echo "PR gate failed — fix the issues above before merging"
          exit 1
