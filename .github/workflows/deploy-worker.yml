name: Deploy Cohrint API Worker

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main        # → staging worker (cohrint-api-staging)
      - production  # → production worker (cohrint-api, api.cohrint.com)
    paths:
      - 'cohrint-worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'production'
        type: choice
        options: [production, staging]

# Only one worker deploy per environment at a time.
concurrency:
  group: deploy-worker-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cohrint-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: cohrint-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: typecheck
    defaults:
      run:
        working-directory: cohrint-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: cohrint-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Determine target environment
        id: env
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_ENV: ${{ inputs.environment }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TARGET="${INPUT_ENV:-production}"
          elif [ "$REF_NAME" = "production" ]; then
            TARGET="production"
          else
            TARGET="staging"
          fi
          echo "target=${TARGET}" >> $GITHUB_OUTPUT
          echo "Deploying to: ${TARGET}"

      - name: Deploy Worker (with retry)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_TARGET: ${{ steps.env.outputs.target }}
        run: |
          if [ "$DEPLOY_TARGET" = "production" ]; then
            DEPLOY_CMD="npm run deploy"
          else
            DEPLOY_CMD="npx wrangler deploy --env staging"
          fi

          MAX_ATTEMPTS=4
          DELAY=30
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "▶ Deploy attempt $attempt / $MAX_ATTEMPTS (${DEPLOY_TARGET})"
            if eval "$DEPLOY_CMD"; then
              echo "✅ Worker deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "⏳ Cloudflare API timeout — waiting ${DELAY}s before retry..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            fi
          done
          echo "❌ All $MAX_ATTEMPTS deploy attempts failed"
          exit 1

      - name: Confirm deployment
        env:
          DEPLOY_TARGET: ${{ steps.env.outputs.target }}
        run: |
          if [ "$DEPLOY_TARGET" = "production" ]; then
            echo "✅ cohrint-api deployed — https://api.cohrint.com"
          else
            echo "✅ cohrint-api-staging deployed"
          fi

      - name: Verify API health post-deploy (production only)
        if: steps.env.outputs.target == 'production'
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --retry 5 --retry-delay 5 --retry-all-errors \
            https://api.cohrint.com/v1/health)
          echo "Health check status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Worker is healthy" || echo "⚠️ Health check returned $STATUS (may still be propagating)"
