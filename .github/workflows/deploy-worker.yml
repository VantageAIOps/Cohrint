name: Deploy VantageAI API Worker

on:
  push:
    branches:
      - main
    paths:
      - 'vantage-worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:  # manual trigger from GitHub Actions UI

jobs:
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vantage-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vantage-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: typecheck
    defaults:
      run:
        working-directory: vantage-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vantage-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Confirm deployment
        run: echo "✅ vantageai-api deployed — https://api.vantageaiops.com"
