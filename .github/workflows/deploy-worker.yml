name: Deploy VantageAI API Worker

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - 'vantage-worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:  # manual trigger from GitHub Actions UI

jobs:
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vantage-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: vantage-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: typecheck
    defaults:
      run:
        working-directory: vantage-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: vantage-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker (with retry)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          MAX_ATTEMPTS=4
          DELAY=30
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "▶ Deploy attempt $attempt / $MAX_ATTEMPTS"
            if npm run deploy; then
              echo "✅ Worker deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "⏳ Cloudflare API timeout — waiting ${DELAY}s before retry..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            fi
          done
          echo "❌ All $MAX_ATTEMPTS deploy attempts failed"
          exit 1

      - name: Confirm deployment
        run: echo "✅ vantageai-api deployed — https://api.vantageaiops.com"

      - name: Verify API health post-deploy
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --retry 5 --retry-delay 5 --retry-all-errors \
            https://api.vantageaiops.com/v1/health)
          echo "Health check status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Worker is healthy" || echo "⚠️ Health check returned $STATUS (may still be propagating)"
