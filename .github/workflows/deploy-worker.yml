name: Deploy Cohrint API Worker

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main        # staging worker (cohrint-api-staging)
      - production  # production worker (cohrint-api, api.cohrint.com)
    paths:
      - 'cohrint-worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'production'
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-worker-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cohrint-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: cohrint-worker/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type check
        run: npm run typecheck

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: typecheck
    if: |
      (github.ref_name == 'main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    defaults:
      run:
        working-directory: cohrint-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: cohrint-worker/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Deploy Worker to Staging (with retry)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          MAX_ATTEMPTS=4
          DELAY=30
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Deploy attempt $attempt / $MAX_ATTEMPTS (staging)"
            if npx wrangler deploy --env staging; then
              echo "Staging deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              sleep $DELAY
              DELAY=$((DELAY * 2))
            fi
          done
          exit 1
      - name: Confirm staging deployment
        run: echo "cohrint-api-staging deployed"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: typecheck
    environment: cloudflare-production
    if: |
      (github.ref_name == 'production' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    defaults:
      run:
        working-directory: cohrint-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: cohrint-worker/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Deploy Worker to Production (with retry)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          MAX_ATTEMPTS=4
          DELAY=30
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Deploy attempt $attempt / $MAX_ATTEMPTS (production)"
            if npm run deploy; then
              echo "Production deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              sleep $DELAY
              DELAY=$((DELAY * 2))
            fi
          done
          exit 1
      - name: Verify API health post-deploy
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --retry 5 --retry-delay 5 --retry-all-errors \
            https://api.cohrint.com/v1/health)
          echo "Health check status: $STATUS"
          [ "$STATUS" = "200" ] && echo "Worker is healthy" || echo "Health check returned $STATUS"
      - name: Confirm production deployment
        run: echo "cohrint-api deployed to https://api.cohrint.com"
